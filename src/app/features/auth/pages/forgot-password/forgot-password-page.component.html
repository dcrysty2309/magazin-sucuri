<section class="forgot-form">
  <div class="forgot-form__intro">
    <p class="forgot-form__eyebrow">Recuperare parola</p>
    <h1>Solicita un email de resetare</h1>
    <p class="forgot-form__lead">
      Introdu adresa folosita la inregistrare si iti trimitem instructiunile de resetare.
    </p>
  </div>

  <form [formGroup]="form" class="forgot-form__panel" novalidate (ngSubmit)="submit()">
    @if (serverError()) {
      <p class="forgot-error forgot-feedback forgot-feedback--top">{{ serverError() }}</p>
    }

    @if (serverMessage()) {
      <p class="forgot-success forgot-feedback forgot-feedback--top">{{ serverMessage() }}</p>
    }

    <label class="forgot-field">
      <span class="forgot-field__label">Email</span>
      <span class="forgot-field__control">
        <input [class.is-invalid]="form.controls.email.touched && form.controls.email.invalid" formControlName="email" placeholder="nume@exemplu.ro" type="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="forgot-field__error-text">Introdu o adresa de email valida.</small>
        }
      </span>
    </label>

    <button class="forgot-button" type="submit">
      {{ loading() ? 'Se trimite...' : 'Trimite emailul de resetare' }}
    </button>
  </form>

  <a class="forgot-form__back" routerLink="/auth/login">Inapoi la autentificare</a>
</section>
