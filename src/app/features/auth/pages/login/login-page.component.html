<section class="auth-form">
  <div class="auth-form__intro">
    <p class="auth-form__eyebrow">Autentificare client</p>
    <h1>Bine ai revenit in contul tau</h1>
    <p class="auth-form__lead">
      Intra in cont pentru a vedea comenzile, adresele salvate si checkout-ul mai rapid.
    </p>
  </div>

  <form [formGroup]="form" class="auth-form__panel" novalidate (ngSubmit)="submit()">
    @if (serverError()) {
      <p class="auth-error auth-feedback auth-feedback--top">{{ serverError() }}</p>
    }

    @if (serverMessage()) {
      <p class="auth-success auth-feedback auth-feedback--top">{{ serverMessage() }}</p>
    }

    <label class="auth-field">
      <span class="auth-field__label">Email</span>
      <span class="auth-field__control">
        <input [class.is-invalid]="form.controls.email.touched && form.controls.email.invalid" formControlName="email" placeholder="nume@exemplu.ro" type="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="auth-field__error-text">
            @if (form.controls.email.hasError('required')) {
              Emailul este obligatoriu.
            } @else {
              Introdu o adresa de email valida.
            }
          </small>
        }
      </span>
    </label>

    <label class="auth-field">
      <span class="auth-field__label">Parola</span>
      <span class="auth-field__control">
        <input [class.is-invalid]="form.controls.password.touched && form.controls.password.invalid" formControlName="password" placeholder="Introdu parola" type="password" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="auth-field__error-text">
            @if (form.controls.password.hasError('required')) {
              Parola este obligatorie.
            } @else {
              Parola trebuie sa aiba minimum 8 caractere.
            }
          </small>
        }
      </span>
    </label>

    <div class="auth-form__row">
      <label class="auth-check">
        <input formControlName="remember" type="checkbox" />
        <span>Tine-ma minte</span>
      </label>
      <a routerLink="/auth/forgot-password">Ai uitat parola?</a>
    </div>

    <button class="auth-button" type="submit">
      {{ loading() ? 'Se verifica...' : 'Autentificare' }}
    </button>
  </form>

  <div class="auth-form__switch">
    <span>Nu ai cont inca?</span>
    <a routerLink="/auth/register">Creeaza cont nou</a>
  </div>
</section>
