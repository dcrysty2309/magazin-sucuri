<section class="reset-form">
  <div class="reset-form__intro">
    <p class="reset-form__eyebrow">Resetare parola</p>
    <h1>Alege o parola noua</h1>
    <p class="reset-form__lead">
      Introdu o parola noua pentru contul tau si continua apoi spre autentificare.
    </p>
  </div>

  <form [formGroup]="form" class="reset-form__panel" novalidate (ngSubmit)="submit()">
    @if (serverError()) {
      <p class="reset-error">{{ serverError() }}</p>
    }

    @if (serverMessage()) {
      <p class="reset-success">{{ serverMessage() }}</p>
    }

    <label class="reset-field">
      <span>Parola noua</span>
      <input formControlName="password" placeholder="Minim 8 caractere" type="password" />
    </label>

    <label class="reset-field">
      <span>Confirma parola</span>
      <input formControlName="confirmPassword" placeholder="Reintrodu parola" type="password" />
    </label>

    <button class="reset-button" type="submit">
      {{ loading() ? 'Se salveaza...' : 'Actualizeaza parola' }}
    </button>
  </form>

  <a class="reset-form__back" routerLink="/auth/login">Inapoi la autentificare</a>
</section>
